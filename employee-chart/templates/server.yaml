apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{.Values.server.deplName}}
  # namespace: {{.Values.namespace}}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{.Values.server.appName}}
  template:
    metadata:
      labels:
        app: {{.Values.server.appName}}
    spec:
      containers:
      - name: {{.Values.server.appName}}
        image: "{{.Values.server.image.name}}:{{.Values.server.image.tag}}"
        ports:
        - containerPort: 8080
        envFrom:
        - secretRef:
            name: {{.Values.secretName}}
        
        resources:
          requests:
            cpu: "250m"
          limits:
            cpu: "500m"

        livenessProbe:
            httpGet:
              path: {{.Values.server.path}}
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 4

        readinessProbe:
          httpGet:
            path: {{.Values.server.path}}
            port: 8080
          initialDelaySeconds: 2
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: {{.Values.server.svcName}}
  # namespace: {{.Values.namespace}}
spec:
  type: LoadBalancer
  selector:
    app: {{.Values.server.appName}}
  ports:
  - protocol: TCP
    port: 8080
    targetPort: 8080

---

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{.Values.server.hpa.name}}
  # namespace: {{.Values.namespace}}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{.Values.server.deplName}}
  minReplicas: {{.Values.server.hpa.minReplicas}}
  maxReplicas: {{.Values.server.hpa.maxReplicas}}
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 50


