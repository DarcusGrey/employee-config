apiVersion: v1
kind: Service
metadata:
  name: {{.Values.database.svcName}}
  namespace: {{.Values.namespace}}
spec:
  clusterIP: None
  selector:
    app: {{.Values.database.appName}}
  ports:
  - port: 5432
    targetPort: 5432


---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{.Values.database.statefulSetName}}
  namespace: {{.Values.namespace}}
spec:
  selector:
    matchLabels:
      app: {{.Values.database.appName}}
  serviceName: "{{.Values.database.svcName}}"
  replicas: {{.Values.database.replicas}}
  template:
    metadata:
      labels:
        app: {{.Values.database.appName}}
    spec:
      containers:
      - name: {{.Values.database.containerName}}
        image: postgres
        ports:
        - containerPort: 5432
        env:
          - name: POSTGRES_USER
            valueFrom:
              secretKeyRef:
                name: {{.Values.secretName}}
                key: DB_USER
          - name: POSTGRES_PASSWORD
            valueFrom:
              secretKeyRef:
                name: {{.Values.secretName}}
                key: DB_PASS
          - name: POSTGRES_DB
            valueFrom:
              secretKeyRef:
                name: {{.Values.secretName}}
                key: DB_NAME
        volumeMounts:
        - name: {{.Values.database.volumeMounts.name}}
          mountPath: {{.Values.database.volumeMounts.mountPath}}

  volumeClaimTemplates:
  - metadata:
      name: {{.Values.database.volumeMounts.name}}
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 1Gi
