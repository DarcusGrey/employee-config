{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
    name: {{ .Release.Namespace }}-isolation
    namespace: {{ .Release.Namespace }}
spec:
    podSelector: {} 
    policyTypes:
    # This blocks only incoming connections
    - Ingress
    ingress:
    # Rule 1: Allow intra-namespace communication
    - from:
        - podSelector: {}   
    
    # Rule 2: Allow external traffic in from the Cilium Gateway
    - from:
        - namespaceSelector:
            matchLabels:
                kubernetes.io/metadata.name: kube-system
{{- end }}