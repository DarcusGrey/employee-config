apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{.Values.server.appName}}-route
  namespace: {{.Release.Namespace}}
spec:
  parentRefs:
  - name: {{.Values.gatewayName}} 
  hostnames:
  - "{{.Values.server.hostname}}"
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: {{.Values.server.path}}
    backendRefs:
    - name: {{.Values.server.svcName}}
      port: {{.Values.server.svcPort}}