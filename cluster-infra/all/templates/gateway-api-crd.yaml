apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gateway-api-crds
  namespace: argocd
  annotations:
    # This MUST be the lowest number so it installs before Cilium
    argocd.argoproj.io/sync-wave: "-3" 
spec:
  project: default
  source:
    # ArgoCD natively points directly to the source repository
    repoURL: 'https://github.com/kubernetes-sigs/gateway-api.git'
    targetRevision: v1.4.1
    path: config/crd/standard
  destination:
    server: {{.Values.cluster.dest_server}}
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      # CRDs are massive; ServerSideApply prevents "metadata too long" errors
      - ServerSideApply=true  
      - SkipDryRunOnMissingResource=true # Prevents the dry-run catch-22
      - CreateNamespace=true