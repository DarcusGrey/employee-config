apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sealed-secrets
  namespace: argocd
  annotations:
    # Forces this to install BEFORE your main applications (which default to wave 0)
    argocd.argoproj.io/sync-wave: "-2" 
spec:
  project: default
  source:
    chart: sealed-secrets
    # OCI registry works, but Bitnami's HTTP repo is often more stable for ArgoCD
    repoURL: https://bitnami.github.io/sealed-secrets 
    targetRevision: 2.19.0
    helm:
      releaseName: sealed-secrets
      values: |
        fullnameOverride: sealed-secrets
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      # Ensures the sync doesn't fail if the namespace somehow drops
      - CreateNamespace=true