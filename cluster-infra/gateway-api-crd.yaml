apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gateway-api-crds
  namespace: argocd
  annotations:
    # This MUST be the lowest number so it installs before Cilium
    argocd.argoproj.io/sync-wave: "-3" 
spec:
  project: default
  source:
    # ArgoCD natively points directly to the source repository
    repoURL: 'https://github.com/kubernetes-sigs/gateway-api.git'
    targetRevision: v1.1.0
    # This path contains the Kustomize files equivalent to experimental-install.yaml
    path: config/crd/experimental
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      # CRDs are massive; ServerSideApply prevents "metadata too long" errors
      - ServerSideApply=true